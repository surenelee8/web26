<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Insect Game</title>
        <link rel="stylesheet" href="style/insect.css">
    </head>

    <body>
        <div class="screen">
            <h1>Catch The Insect</h1>
            <button class="btn" id="start-btn">Play Game</button>
        </div>

        <div class="screen">
            <h1>What is your favorite insect?</h1>
            <ul>
                <li>
                    <button class="choose-insect-btn">
                        <p>Fly</p>
                        <img src="images/fly.png" alt="Fly">
                    </button>
                </li>

                <li>
                    <button class="choose-insect-btn">
                        <p>Butterfy</p>
                        <img src="images/butt.jfif" alt="Butterfly">
                    </button>
                </li>

                <li>
                    <button class="choose-insect-btn">
                        <p>Spider</p>
                        <img src="images/spider.webp" alt="Spider">
                    </button>
                </li>

                <li>
                    <button class="choose-insect-btn">
                        <p>Roach</p>
                        <img src="images/croach.jfif" alt="Roach">
                    </button>
                </li>

            </ul>
        </div>

        <div class="screen game-container" id="game-container">
            <h3 id="time" class="time">Time: 00:00</h3>
            <h3 id="score" class="score">Score: 0</h3>
            <h5 id="Message" class="Message">
                
            </h5>

        </div>

        <script src="script/insect.js"></script>
    </body>

</html
